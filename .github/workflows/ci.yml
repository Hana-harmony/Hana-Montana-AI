name: ci

on:
  pull_request:
    branches: [main, feature]
  push:
    branches: [main, feature]

permissions:
  contents: read
  packages: write

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          fetch-depth: 0
      - name: CI 검증용 LFS 입력 복원
        run: |
          git lfs pull \
            --include="data/k_fnspid/v4/documents.parquet,data/external/kf_deberta_benchmark/ratings_train.csv,data/external/kf_deberta_benchmark/ratings_val.csv" \
            --exclude=""
          python - <<'PY'
          from pathlib import Path

          expected_minimum_bytes = {
              "data/k_fnspid/v4/documents.parquet": 270_000_000,
              "data/external/kf_deberta_benchmark/ratings_train.csv": 14_000_000,
              "data/external/kf_deberta_benchmark/ratings_val.csv": 1_700_000,
          }
          for raw_path, minimum_bytes in expected_minimum_bytes.items():
              path = Path(raw_path)
              if not path.is_file() or path.stat().st_size < minimum_bytes:
                  raise SystemExit(f"CI LFS 입력 복원 실패: {path}")
              with path.open("rb") as stream:
                  prefix = stream.read(64)
              if prefix.startswith(b"version https://git-lfs.github.com/spec"):
                  raise SystemExit(f"CI LFS 포인터가 남아 있습니다: {path}")
          PY
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1
        with:
          python-version: '3.12'
      - uses: astral-sh/setup-uv@94527f2e458b27549849d47d273a16bec83a01e9
      - name: 의존성 동기화
        run: uv sync --all-groups --extra transformer
      - name: DAPT 기준 모델 고정본 복원
        env:
          HF_HUB_DISABLE_TELEMETRY: '1'
        run: uv run python scripts/restore_ci_dapt_base_model.py
      - name: 메시지 컨벤션 검사
        if: github.event_name == 'pull_request'
        env:
          PR_TITLE: ${{ github.event.pull_request.title }}
          PR_BODY: ${{ github.event.pull_request.body }}
          PR_BASE_SHA: ${{ github.event.pull_request.base.sha }}
          PR_HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          PR_BASE_REF: ${{ github.event.pull_request.base.ref }}
          PR_HEAD_REF: ${{ github.event.pull_request.head.ref }}
        run: uv run python scripts/verify_message_conventions.py --base "$PR_BASE_SHA" --head "$PR_HEAD_SHA"
      - name: 하네스 Git 흐름 검사
        if: github.event_name == 'pull_request'
        env:
          PR_BASE_SHA: ${{ github.event.pull_request.base.sha }}
          PR_BASE_REF: ${{ github.event.pull_request.base.ref }}
          PR_HEAD_REF: ${{ github.event.pull_request.head.ref }}
        run: >-
          uv run python scripts/verify_harness_git_flow.py
          --base-ref "$PR_BASE_SHA"
          --pr-base "$PR_BASE_REF"
          --head-ref "$PR_HEAD_REF"
      - name: 정적 검사
        run: uv run ruff check . && uv run mypy
      - name: 보안 검사
        run: uv run bandit -c pyproject.toml -r src
      - name: 시크릿 hygiene 검사
        run: uv run python scripts/verify_secret_hygiene.py
      - name: 활성 감성 릴리스 공급망 검사
        env:
          SENTIMENT_BASE_MODEL_PATH: ${{ vars.HANNAH_SENTIMENT_CI_BASE_MODEL_PATH }}
        run: |
          if [[ -e releases/sentiment/current.json || -L releases/sentiment/current.json ]]; then
            POINTER_SCHEMA="$(python -c 'import json; print(json.load(open("releases/sentiment/current.json", encoding="utf-8"))["schema_version"])')"
            if [[ "${POINTER_SCHEMA}" == hana-sentiment-release-pointer/v1 ]]; then
              : "${SENTIMENT_BASE_MODEL_PATH:?v1 릴리스 검증용 base model 경로가 필요합니다}"
              uv run python scripts/verify_sentiment_release.py \
                --base-model-runtime-path /app/models/kf-deberta-base \
                --base-model-verification-path "${SENTIMENT_BASE_MODEL_PATH}"
            else
              uv run python scripts/verify_sentiment_release.py \
                --base-model-runtime-path /release-tree-bound-v6
            fi
          fi
      - name: 테스트
        run: uv run pytest

  deploy-prod:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: test
    runs-on: ubuntu-latest
    environment: production
    concurrency:
      group: hannah-montana-ai-production
      cancel-in-progress: false
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
      - name: 활성 감성 릴리스 확인
        id: sentiment_release
        run: |
          if [[ -f releases/sentiment/current.json ]]; then
            echo 'active=true' >> "${GITHUB_OUTPUT}"
          else
            echo 'active=false' >> "${GITHUB_OUTPUT}"
            echo '::notice title=운영 배포 유지::승격된 감성 릴리스가 없어 기존 운영 이미지를 유지합니다.'
          fi
      - name: 운영 secret 확인
        if: steps.sentiment_release.outputs.active == 'true'
        env:
          PROD_HOST: ${{ secrets.PROD_HOST }}
          PROD_USER: ${{ secrets.PROD_USER }}
          PROD_SSH_KEY: ${{ secrets.PROD_SSH_KEY }}
          PROD_SSH_PASSWORD: ${{ secrets.PROD_SSH_PASSWORD }}
          PROD_HOST_KEY: ${{ secrets.PROD_HOST_KEY }}
          GHCR_TOKEN: ${{ secrets.GHCR_TOKEN }}
          DISCORD_WEBHOOK: ${{ secrets.HANNAH_DISCORD_WEBHOOK_URL }}
          SENTIMENT_RELEASE_PUBLIC_KEY_PEM: ${{ secrets.HANNAH_SENTIMENT_RELEASE_PUBLIC_KEY_PEM }}
          SENTIMENT_RELEASE_SIGNER_KEY_ID: ${{ secrets.HANNAH_SENTIMENT_RELEASE_SIGNER_KEY_ID }}
          SENTIMENT_RELEASE_EXPECTED_ID: ${{ secrets.HANNAH_SENTIMENT_RELEASE_EXPECTED_ID }}
          SENTIMENT_RELEASE_EXPECTED_GIT_COMMIT: ${{ secrets.HANNAH_SENTIMENT_RELEASE_EXPECTED_GIT_COMMIT }}
        run: |
          : "${PROD_HOST:?}"
          : "${PROD_USER:?}"
          : "${PROD_SSH_KEY:?}"
          : "${PROD_SSH_PASSWORD:?}"
          : "${PROD_HOST_KEY:?}"
          : "${GHCR_TOKEN:?}"
          : "${DISCORD_WEBHOOK:?}"
          : "${SENTIMENT_RELEASE_PUBLIC_KEY_PEM:?}"
          : "${SENTIMENT_RELEASE_SIGNER_KEY_ID:?}"
          : "${SENTIMENT_RELEASE_EXPECTED_ID:?}"
          : "${SENTIMENT_RELEASE_EXPECTED_GIT_COMMIT:?}"
          [[ "${DISCORD_WEBHOOK}" == https://discord.com/api/webhooks/* ]]
          [[ "${SENTIMENT_RELEASE_PUBLIC_KEY_PEM}" == *"BEGIN PUBLIC KEY"* ]]
          [[ "${SENTIMENT_RELEASE_SIGNER_KEY_ID}" =~ ^[0-9a-f]{64}$ ]]
          [[ "${SENTIMENT_RELEASE_EXPECTED_ID}" =~ ^[A-Za-z0-9][A-Za-z0-9._-]{0,239}$ ]]
          [[ "${SENTIMENT_RELEASE_EXPECTED_GIT_COMMIT}" =~ ^[0-9a-f]{40}$ ]]
      - uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c
        if: steps.sentiment_release.outputs.active == 'true'
      - name: 이미지 이름 설정
        if: steps.sentiment_release.outputs.active == 'true'
        run: echo "IMAGE_NAME=ghcr.io/${GITHUB_REPOSITORY,,}" >> "$GITHUB_ENV"
      - uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0
        if: steps.sentiment_release.outputs.active == 'true'
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: ARM64 운영 이미지 빌드
        if: steps.sentiment_release.outputs.active == 'true'
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a
        with:
          context: .
          platforms: linux/arm64
          push: true
          tags: ${{ env.IMAGE_NAME }}:${{ github.sha }}
      - name: SSH 설정
        if: steps.sentiment_release.outputs.active == 'true'
        env:
          PROD_HOST: ${{ secrets.PROD_HOST }}
          PROD_USER: ${{ secrets.PROD_USER }}
          PROD_SSH_KEY: ${{ secrets.PROD_SSH_KEY }}
          PROD_HOST_KEY: ${{ secrets.PROD_HOST_KEY }}
        run: |
          install -m 700 -d ~/.ssh
          printf '%s\n' "${PROD_SSH_KEY}" > ~/.ssh/prod_key
          printf '%s\n' "${PROD_HOST_KEY}" > ~/.ssh/known_hosts
          printf '%s\n' \
            'Host production' \
            "  HostName ${PROD_HOST}" \
            "  User ${PROD_USER}" \
            '  IdentityFile ~/.ssh/prod_key' \
            '  IdentitiesOnly yes' \
            '  IdentityAgent none' \
            '  UserKnownHostsFile ~/.ssh/known_hosts' \
            '  StrictHostKeyChecking yes' \
            '  PreferredAuthentications publickey,password' \
            '  PubkeyAuthentication yes' \
            '  PasswordAuthentication yes' \
            '  KbdInteractiveAuthentication no' \
            '  NumberOfPasswordPrompts 1' \
            '  ConnectTimeout 15' \
            '  ServerAliveInterval 15' \
            '  ServerAliveCountMax 3' \
            > ~/.ssh/config
          chmod 600 ~/.ssh/prod_key ~/.ssh/known_hosts
          chmod 600 ~/.ssh/config
      - name: 운영 설정 생성
        if: steps.sentiment_release.outputs.active == 'true'
        env:
          GHCR_TOKEN: ${{ secrets.GHCR_TOKEN }}
          DISCORD_WEBHOOK: ${{ secrets.HANNAH_DISCORD_WEBHOOK_URL }}
          SENTIMENT_RELEASE_PUBLIC_KEY_PEM: ${{ secrets.HANNAH_SENTIMENT_RELEASE_PUBLIC_KEY_PEM }}
          SENTIMENT_RELEASE_SIGNER_KEY_ID: ${{ secrets.HANNAH_SENTIMENT_RELEASE_SIGNER_KEY_ID }}
          SENTIMENT_RELEASE_EXPECTED_ID: ${{ secrets.HANNAH_SENTIMENT_RELEASE_EXPECTED_ID }}
          SENTIMENT_RELEASE_EXPECTED_GIT_COMMIT: ${{ secrets.HANNAH_SENTIMENT_RELEASE_EXPECTED_GIT_COMMIT }}
        run: |
          printf '%s\n' "${SENTIMENT_RELEASE_PUBLIC_KEY_PEM}" > sentiment-release-public-key.pem
          GHCR_USERNAME="$(
            curl --fail --silent --show-error --proto '=https' --tlsv1.2 \
              --retry 3 --retry-all-errors \
              --header "Authorization: Bearer ${GHCR_TOKEN}" \
              --header 'Accept: application/vnd.github+json' \
              --header 'X-GitHub-Api-Version: 2022-11-28' \
              https://api.github.com/user \
              | jq --exit-status --raw-output \
                  '.login | strings | select(length <= 39 and test("^[A-Za-z0-9]+(?:-[A-Za-z0-9]+)*$"))'
          )"
          [[ -n "${GHCR_USERNAME}" ]]
          printf '%s\n' \
            'HANNAH_KOREAN_TRANSLATION_LLM_ENDPOINT=http://hannah-qwen:8080' \
            'HANNAH_KOREAN_TRANSLATION_LLM_TIMEOUT_SECONDS=600' \
            'HANNAH_KOREAN_TRANSLATION_LLM_MAX_TOKENS=2048' \
            'HANNAH_KOREAN_TRANSLATION_MAX_CONCURRENCY=2' \
            'HANNAH_RUNTIME_ENVIRONMENT=production' \
            'HANNAH_PROJECT_ROOT=/app' \
            'HANNAH_SENTIMENT_BASE_MODEL_PATH=/app/models/kf-deberta-base' \
            'HANNAH_SENTIMENT_RELEASE_CURRENT_PATH=/app/releases/sentiment/current.json' \
            'HANNAH_SENTIMENT_RELEASE_ATTESTATION_MODE=dsse-ed25519-v1' \
            'HANNAH_SENTIMENT_RELEASE_PUBLIC_KEY_PATH=/run/secrets/sentiment-release-public-key.pem' \
            "HANNAH_SENTIMENT_RELEASE_SIGNER_KEY_ID=${SENTIMENT_RELEASE_SIGNER_KEY_ID}" \
            "HANNAH_SENTIMENT_RELEASE_EXPECTED_ID=${SENTIMENT_RELEASE_EXPECTED_ID}" \
            "HANNAH_SENTIMENT_RELEASE_EXPECTED_GIT_COMMIT=${SENTIMENT_RELEASE_EXPECTED_GIT_COMMIT}" \
            "HANNAH_DISCORD_WEBHOOK_URL=${DISCORD_WEBHOOK}" \
            > application.env
          printf '%s\n' \
            "IMAGE=${IMAGE_NAME}:${GITHUB_SHA}" \
            "GHCR_USERNAME=${GHCR_USERNAME}" \
            "GHCR_TOKEN=${GHCR_TOKEN}" \
            'VERIFY_SENTIMENT_RELEASE=true' \
            > deploy.env
          chmod 600 application.env deploy.env
          chmod 444 sentiment-release-public-key.pem
      - name: OCI 운영 배포
        if: steps.sentiment_release.outputs.active == 'true'
        env:
          PROD_SSH_PASSWORD: ${{ secrets.PROD_SSH_PASSWORD }}
          SSH_ASKPASS: ${{ github.workspace }}/scripts/ssh-askpass.sh
          SSH_ASKPASS_REQUIRE: force
          DISPLAY: github-actions:0
        run: |
          ssh production 'sudo install -d -o "$(id -un)" -g "$(id -gn)" -m 700 /opt/hannah-montana-ai'
          scp application.env deploy.env sentiment-release-public-key.pem scripts/deploy-prod.sh scripts/bootstrap-host.sh scripts/runtime-secrets.sh scripts/bootstrap-qwen.sh scripts/download-qwen-model.sh deploy/compose/hannah-qwen.yml deploy/nginx/hannah-montana-ai.conf 'production:/opt/hannah-montana-ai/'
          ssh production 'chmod 700 /opt/hannah-montana-ai/bootstrap-host.sh && /opt/hannah-montana-ai/bootstrap-host.sh'
          ssh production 'chmod 700 /opt/hannah-montana-ai/bootstrap-qwen.sh /opt/hannah-montana-ai/download-qwen-model.sh && /opt/hannah-montana-ai/bootstrap-qwen.sh'
          ssh production 'chmod 700 /opt/hannah-montana-ai/deploy-prod.sh && /opt/hannah-montana-ai/deploy-prod.sh'

  deploy-runtime-overlay:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: test
    runs-on: ubuntu-latest
    environment: production
    concurrency:
      group: hannah-montana-ai-production
      cancel-in-progress: false
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          fetch-depth: 0
      - name: 활성 감성 릴리스 확인
        id: sentiment_release
        run: |
          if [[ -f releases/sentiment/current.json ]]; then
            echo 'active=true' >> "${GITHUB_OUTPUT}"
          else
            echo 'active=false' >> "${GITHUB_OUTPUT}"
          fi
      - name: 런타임 오버레이 secret 확인
        if: steps.sentiment_release.outputs.active == 'false'
        env:
          PROD_HOST: ${{ secrets.PROD_HOST }}
          PROD_USER: ${{ secrets.PROD_USER }}
          PROD_SSH_KEY: ${{ secrets.PROD_SSH_KEY }}
          PROD_SSH_PASSWORD: ${{ secrets.PROD_SSH_PASSWORD }}
          PROD_HOST_KEY: ${{ secrets.PROD_HOST_KEY }}
          GHCR_TOKEN: ${{ secrets.GHCR_TOKEN }}
        run: |
          : "${PROD_HOST:?}"
          : "${PROD_USER:?}"
          : "${PROD_SSH_KEY:?}"
          : "${PROD_SSH_PASSWORD:?}"
          : "${PROD_HOST_KEY:?}"
          : "${GHCR_TOKEN:?}"
      - name: SSH 설정
        if: steps.sentiment_release.outputs.active == 'false'
        env:
          PROD_HOST: ${{ secrets.PROD_HOST }}
          PROD_USER: ${{ secrets.PROD_USER }}
          PROD_SSH_KEY: ${{ secrets.PROD_SSH_KEY }}
          PROD_HOST_KEY: ${{ secrets.PROD_HOST_KEY }}
        run: |
          install -m 700 -d ~/.ssh
          printf '%s\n' "${PROD_SSH_KEY}" > ~/.ssh/prod_key
          printf '%s\n' "${PROD_HOST_KEY}" > ~/.ssh/known_hosts
          printf '%s\n' \
            'Host production' \
            "  HostName ${PROD_HOST}" \
            "  User ${PROD_USER}" \
            '  IdentityFile ~/.ssh/prod_key' \
            '  IdentitiesOnly yes' \
            '  IdentityAgent none' \
            '  UserKnownHostsFile ~/.ssh/known_hosts' \
            '  StrictHostKeyChecking yes' \
            '  PreferredAuthentications publickey,password' \
            '  PubkeyAuthentication yes' \
            '  PasswordAuthentication yes' \
            '  KbdInteractiveAuthentication no' \
            '  NumberOfPasswordPrompts 1' \
            '  ConnectTimeout 15' \
            '  ServerAliveInterval 15' \
            '  ServerAliveCountMax 3' \
            > ~/.ssh/config
          chmod 600 ~/.ssh/prod_key ~/.ssh/known_hosts ~/.ssh/config
      - uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c
        if: steps.sentiment_release.outputs.active == 'false'
      - name: 이미지 이름 설정
        if: steps.sentiment_release.outputs.active == 'false'
        run: echo "IMAGE_NAME=ghcr.io/${GITHUB_REPOSITORY,,}" >> "$GITHUB_ENV"
      - uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0
        if: steps.sentiment_release.outputs.active == 'false'
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: 현재 운영 이미지 고정
        id: current_image
        if: steps.sentiment_release.outputs.active == 'false'
        env:
          PROD_SSH_PASSWORD: ${{ secrets.PROD_SSH_PASSWORD }}
          SSH_ASKPASS: ${{ github.workspace }}/scripts/ssh-askpass.sh
          SSH_ASKPASS_REQUIRE: force
          DISPLAY: github-actions:0
        run: |
          current_image="$(ssh production "docker inspect --format '{{.Config.Image}}' hannah-montana-ai")"
          [[ "${current_image}" =~ ^ghcr\.io/hana-harmony/hana-montana-ai:[0-9a-f]{40}$ ]]
          base_commit="${current_image##*:}"
          git merge-base --is-ancestor "${base_commit}" "${GITHUB_SHA}"
          digest="$(
            docker buildx imagetools inspect "${current_image}" --format '{{json .Manifest.Digest}}' \
              | jq --exit-status --raw-output 'select(test("^sha256:[0-9a-f]{64}$"))'
          )"
          echo "pinned=${current_image}@${digest}" >> "${GITHUB_OUTPUT}"
      - name: ARM64 런타임 오버레이 이미지 빌드
        if: steps.sentiment_release.outputs.active == 'false'
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a
        with:
          context: .
          file: Dockerfile.runtime-overlay
          platforms: linux/arm64
          push: true
          tags: ${{ env.IMAGE_NAME }}:${{ github.sha }}
          build-args: |
            BASE_IMAGE=${{ steps.current_image.outputs.pinned }}
      - name: 런타임 오버레이 배포 설정 생성
        if: steps.sentiment_release.outputs.active == 'false'
        env:
          GHCR_TOKEN: ${{ secrets.GHCR_TOKEN }}
        run: |
          GHCR_USERNAME="$(
            curl --fail --silent --show-error --proto '=https' --tlsv1.2 \
              --retry 3 --retry-all-errors \
              --header "Authorization: Bearer ${GHCR_TOKEN}" \
              --header 'Accept: application/vnd.github+json' \
              --header 'X-GitHub-Api-Version: 2022-11-28' \
              https://api.github.com/user \
              | jq --exit-status --raw-output \
                  '.login | strings | select(length <= 39 and test("^[A-Za-z0-9]+(?:-[A-Za-z0-9]+)*$"))'
          )"
          [[ -n "${GHCR_USERNAME}" ]]
          printf '%s\n' \
            "IMAGE=${IMAGE_NAME}:${GITHUB_SHA}" \
            "GHCR_USERNAME=${GHCR_USERNAME}" \
            "GHCR_TOKEN=${GHCR_TOKEN}" \
            'VERIFY_SENTIMENT_RELEASE=false' \
            > deploy.env
          chmod 600 deploy.env
      - name: OCI 런타임 오버레이 배포
        if: steps.sentiment_release.outputs.active == 'false'
        env:
          PROD_SSH_PASSWORD: ${{ secrets.PROD_SSH_PASSWORD }}
          SSH_ASKPASS: ${{ github.workspace }}/scripts/ssh-askpass.sh
          SSH_ASKPASS_REQUIRE: force
          DISPLAY: github-actions:0
        run: |
          ssh production 'test -s /opt/hannah-montana-ai/application.env'
          scp deploy.env scripts/deploy-prod.sh deploy/nginx/hannah-montana-ai.conf 'production:/opt/hannah-montana-ai/'
          ssh production 'chmod 700 /opt/hannah-montana-ai/deploy-prod.sh && /opt/hannah-montana-ai/deploy-prod.sh'
