name: ci

on:
  pull_request:
    branches: [main, feature]
  push:
    branches: [main, feature]

permissions:
  contents: read
  packages: write

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          fetch-depth: 0
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1
        with:
          python-version: '3.12'
      - uses: astral-sh/setup-uv@94527f2e458b27549849d47d273a16bec83a01e9
      - name: 의존성 동기화
        run: uv sync --all-groups
      - name: 메시지 컨벤션 검사
        if: github.event_name == 'pull_request'
        env:
          PR_TITLE: ${{ github.event.pull_request.title }}
          PR_BODY: ${{ github.event.pull_request.body }}
          PR_BASE_SHA: ${{ github.event.pull_request.base.sha }}
          PR_HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          PR_BASE_REF: ${{ github.event.pull_request.base.ref }}
          PR_HEAD_REF: ${{ github.event.pull_request.head.ref }}
        run: uv run python scripts/verify_message_conventions.py --base "$PR_BASE_SHA" --head "$PR_HEAD_SHA"
      - name: 정적 검사
        run: uv run ruff check . && uv run mypy
      - name: 보안 검사
        run: uv run bandit -c pyproject.toml -r src
      - name: 시크릿 hygiene 검사
        run: uv run python scripts/verify_secret_hygiene.py
      - name: 테스트
        run: uv run pytest

  deploy-prod:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: test
    runs-on: ubuntu-latest
    environment: production
    concurrency:
      group: hannah-montana-ai-production
      cancel-in-progress: false
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
      - name: 운영 secret 확인
        env:
          PROD_HOST: ${{ secrets.PROD_HOST }}
          PROD_USER: ${{ secrets.PROD_USER }}
          PROD_SSH_KEY: ${{ secrets.PROD_SSH_KEY }}
          PROD_SSH_PASSWORD: ${{ secrets.PROD_SSH_PASSWORD }}
          PROD_HOST_KEY: ${{ secrets.PROD_HOST_KEY }}
          GHCR_TOKEN: ${{ secrets.GHCR_TOKEN }}
          DISCORD_WEBHOOK: ${{ secrets.HANNAH_DISCORD_WEBHOOK_URL }}
        run: |
          : "${PROD_HOST:?}"
          : "${PROD_USER:?}"
          : "${PROD_SSH_KEY:?}"
          : "${PROD_SSH_PASSWORD:?}"
          : "${PROD_HOST_KEY:?}"
          : "${GHCR_TOKEN:?}"
          : "${DISCORD_WEBHOOK:?}"
          [[ "${DISCORD_WEBHOOK}" == https://discord.com/api/webhooks/* ]]
      - uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c
      - name: 이미지 이름 설정
        run: echo "IMAGE_NAME=ghcr.io/${GITHUB_REPOSITORY,,}" >> "$GITHUB_ENV"
      - uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: ARM64 운영 이미지 빌드
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a
        with:
          context: .
          platforms: linux/arm64
          push: true
          tags: ${{ env.IMAGE_NAME }}:${{ github.sha }}
      - name: SSH 설정
        env:
          PROD_HOST: ${{ secrets.PROD_HOST }}
          PROD_USER: ${{ secrets.PROD_USER }}
          PROD_SSH_KEY: ${{ secrets.PROD_SSH_KEY }}
          PROD_HOST_KEY: ${{ secrets.PROD_HOST_KEY }}
        run: |
          install -m 700 -d ~/.ssh
          printf '%s\n' "${PROD_SSH_KEY}" > ~/.ssh/prod_key
          printf '%s\n' "${PROD_HOST_KEY}" > ~/.ssh/known_hosts
          printf '%s\n' \
            'Host production' \
            "  HostName ${PROD_HOST}" \
            "  User ${PROD_USER}" \
            '  IdentityFile ~/.ssh/prod_key' \
            '  IdentitiesOnly yes' \
            '  IdentityAgent none' \
            '  UserKnownHostsFile ~/.ssh/known_hosts' \
            '  StrictHostKeyChecking yes' \
            '  PreferredAuthentications publickey,password' \
            '  PubkeyAuthentication yes' \
            '  PasswordAuthentication yes' \
            '  KbdInteractiveAuthentication no' \
            '  NumberOfPasswordPrompts 1' \
            '  ConnectTimeout 15' \
            '  ServerAliveInterval 15' \
            '  ServerAliveCountMax 3' \
            > ~/.ssh/config
          chmod 600 ~/.ssh/prod_key ~/.ssh/known_hosts
          chmod 600 ~/.ssh/config
      - name: 운영 설정 생성
        env:
          GHCR_TOKEN: ${{ secrets.GHCR_TOKEN }}
          DISCORD_WEBHOOK: ${{ secrets.HANNAH_DISCORD_WEBHOOK_URL }}
        run: |
          GHCR_USERNAME="$(
            curl --fail --silent --show-error --proto '=https' --tlsv1.2 \
              --retry 3 --retry-all-errors \
              --header "Authorization: Bearer ${GHCR_TOKEN}" \
              --header 'Accept: application/vnd.github+json' \
              --header 'X-GitHub-Api-Version: 2022-11-28' \
              https://api.github.com/user \
              | jq --exit-status --raw-output \
                  '.login | strings | select(length <= 39 and test("^[A-Za-z0-9]+(?:-[A-Za-z0-9]+)*$"))'
          )"
          [[ -n "${GHCR_USERNAME}" ]]
          printf '%s\n' \
            'HANNAH_KOREAN_TRANSLATION_LLM_ENDPOINT=http://hannah-qwen:8080' \
            'HANNAH_KOREAN_TRANSLATION_LLM_TIMEOUT_SECONDS=600' \
            'HANNAH_KOREAN_TRANSLATION_LLM_MAX_TOKENS=2048' \
            'HANNAH_KOREAN_TRANSLATION_MAX_CONCURRENCY=2' \
            'HANNAH_RUNTIME_ENVIRONMENT=production' \
            "HANNAH_DISCORD_WEBHOOK_URL=${DISCORD_WEBHOOK}" \
            > application.env
          printf '%s\n' \
            "IMAGE=${IMAGE_NAME}:${GITHUB_SHA}" \
            "GHCR_USERNAME=${GHCR_USERNAME}" \
            "GHCR_TOKEN=${GHCR_TOKEN}" \
            > deploy.env
          chmod 600 application.env deploy.env
      - name: OCI 운영 배포
        env:
          PROD_SSH_PASSWORD: ${{ secrets.PROD_SSH_PASSWORD }}
          SSH_ASKPASS: ${{ github.workspace }}/scripts/ssh-askpass.sh
          SSH_ASKPASS_REQUIRE: force
          DISPLAY: github-actions:0
        run: |
          ssh production 'sudo install -d -o "$(id -un)" -g "$(id -gn)" -m 700 /opt/hannah-montana-ai'
          scp application.env deploy.env scripts/deploy-prod.sh scripts/bootstrap-host.sh scripts/runtime-secrets.sh scripts/bootstrap-qwen.sh scripts/download-qwen-model.sh deploy/compose/hannah-qwen.yml deploy/nginx/hannah-montana-ai.conf 'production:/opt/hannah-montana-ai/'
          ssh production 'chmod 700 /opt/hannah-montana-ai/bootstrap-host.sh && /opt/hannah-montana-ai/bootstrap-host.sh'
          ssh production 'chmod 700 /opt/hannah-montana-ai/bootstrap-qwen.sh /opt/hannah-montana-ai/download-qwen-model.sh && /opt/hannah-montana-ai/bootstrap-qwen.sh'
          ssh production 'chmod 700 /opt/hannah-montana-ai/deploy-prod.sh && /opt/hannah-montana-ai/deploy-prod.sh'
